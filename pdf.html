<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle CAPTCHA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .captcha-container {
            position: relative;
            width: 300px;
            height: 200px;
            margin: 20px auto;
            background: #f0f0f0;
            border: 2px solid #000;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .puzzle-container {
            position: relative;
            width: 300px;
            height: 200px;
        }
        .puzzle-container img {
            width: 100%;
            height: 100%;
        }
        .puzzle-piece {
            position: absolute;
            width: 60px;
            height: 60px;
            background:#42ae3d;
            border: 2px solid #000;
            cursor: grab;
        }
        .circle-piece {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #42ae3d;
            border-radius: 50%;
            border: 2px solid #000;
        }
        .target-area {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px dashed #000;
            top: 70px;
            left: 240px;
        }
        .slider-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .submit-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            display: none;
        }
        .submit-container {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>Sliding captcha</h1>
    <sub>slide to complete the puzzle</sub>

    <div class="container">
        <div class="puzzle-container">
            <img src="nyabzgallery/collage.jpeg" alt="puzzle-image" id="puzzle-image" />
            <div class="puzzle-piece" id="puzzle-piece"></div>
            <div class="circle-piece" id="circle-piece"></div>
            <div class="target-area" id="target-area"></div>
        </div>
    </div>

    <div class="slider-container">
        <input type="range" min="0" max="100" value="0" id="slider">
    </div>
    <div class="submit-container">
        <button class="submit-btn" id="submit-btn">Submit</button>
    </div>
    
    <script>
        const puzzle = document.getElementById('puzzle-piece');
        const slider = document.getElementById('slider');
        const submitBtn = document.getElementById('submit-btn');
        
        puzzle.style.top = '70px';
        puzzle.style.left = '0px';
        
        slider.addEventListener('input', function() {
            puzzle.style.left = `${this.value * 2.4}px`;
        });

        slider.addEventListener('change', function() {
            if (parseInt(this.value) === 100) {
                submitBtn.style.display = 'block';
            } else {
                submitBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
